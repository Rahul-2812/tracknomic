services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
    ports:
      - "5432:5432"
    volumes:
      - fintrack_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fintrack
      DB_USER: fintrack
      DB_PASSWORD: fintrack
      ADMIN_USERNAME: "rahul"
      ADMIN_EMAIL: "mailrahul2812@gmail.com"
      ADMIN_PASSWORD: "Rahul@2812"
      JWT_SECRET: "change-me-in-prod-change-me-in-prod-change-me-in-prod"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  fintrack_pg:

